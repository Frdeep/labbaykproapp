[project]
id = "labbayk-app"

[api]
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322

[studio]
port = 54323

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://app.labbayk.fr"]
jwt_expiry = 3600
enable_signup = true

[auth.external.google]
enabled = true
client_id = ""
secret = ""

[auth.external.apple]
enabled = true
client_id = ""
secret = ""

[storage]
file_size_limit = "10MB"
